<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyRajRide Ultimate</title>

<style>
body{margin:0;font-family:Poppins;background:#0f172a;color:white}

/* HEADER */
.header{
padding:20px;text-align:center;
background:linear-gradient(135deg,#1a3cff,#0d1b7e);
}

/* CARD */
.card{
margin:12px;padding:15px;
border-radius:15px;
background:#1f2937;
}

/* INPUT */
input,select{
width:100%;padding:12px;margin:6px 0;
border-radius:10px;border:none;
}

/* BUTTON */
.btn{
width:100%;padding:14px;
background:#3b82f6;color:white;
border:none;border-radius:12px;
}

/* ROUTES */
.slider{
display:flex;overflow:auto;gap:10px;
}
.route{
min-width:140px;padding:12px;
background:#374151;border-radius:10px;
text-align:center;cursor:pointer;
}

/* PLACE */
.place{
background:#374151;margin:5px 0;
padding:8px;border-radius:8px;
}

/* FLOAT */
.float{
position:fixed;bottom:20px;right:15px;
display:flex;flex-direction:column;gap:10px;
}
.fbtn{padding:15px;border-radius:50%;color:white;border:none}
.call{background:red}
.wa{background:#25D366}

/* SHEET */
.sheet{
position:fixed;bottom:-100%;left:0;width:100%;
background:#111827;padding:20px;
border-radius:20px 20px 0 0;
transition:0.4s;
max-height:70%;overflow:auto;
}
.show{bottom:0}

</style>
</head>

<body>

<div class="header">
<h2>🚖 MyRajRide Ultimate</h2>
</div>

<!-- SEARCH -->
<div class="card">
<input type="text" id="search" placeholder="Search city..." onkeyup="searchCity()">
</div>

<!-- ROUTES -->
<div class="card">
<h3>🔥 Routes</h3>
<div class="slider">

<div class="route" onclick="selectRoute('Jaipur','Khatu')">Khatu</div>
<div class="route" onclick="selectRoute('Jaipur','Udaipur')">Udaipur</div>
<div class="route" onclick="selectRoute('Jaipur','Jaisalmer')">Jaisalmer</div>
<div class="route" onclick="selectRoute('Delhi','Manali')">Manali</div>
<div class="route" onclick="selectRoute('Delhi','Kashmir')">Kashmir</div>
<div class="route" onclick="selectRoute('Delhi','Amritsar')">Amritsar</div>

</div>
</div>

<!-- PACKAGE -->
<div class="card">
<h3>📦 Packages</h3>
<div class="route" onclick="setPackage('3 Days Tour')">3 Days</div>
<div class="route" onclick="setPackage('5 Days Tour')">5 Days</div>
<div class="route" onclick="setPackage('7 Days Tour')">7 Days</div>
</div>

<!-- BOOKING -->
<div class="card">

<input id="name" placeholder="Name">
<input type="date" id="date">

<select id="trip">
<option value="1">One Way</option>
<option value="2">Round Trip</option>
</select>

<select id="from">
<option>Jaipur</option>
<option>Delhi</option>
</select>

<select id="to">
<option>Khatu</option>
<option>Udaipur</option>
<option>Manali</option>
<option>Kashmir</option>
</select>

<select id="car">
<option value="12">Sedan ₹12/km</option>
<option value="14">Innova ₹14/km</option>
<option value="20">Tempo ₹20/km</option>
</select>

<button class="btn" onclick="calc()">Check Price</button>
<div id="price"></div>

<button class="btn" onclick="book()">Book Now</button>

</div>

<!-- DETAILS -->
<div id="sheet" class="sheet"></div>

<!-- FLOAT -->
<div class="float">
<button class="fbtn call" onclick="call()">📞</button>
<button class="fbtn wa" onclick="wa()">💬</button>
</div>

<script>

let selectedPackage="";
let selectedRoute="";

// ROUTE SELECT
function selectRoute(f,t){
document.getElementById("from").value=f;
document.getElementById("to").value=t;
selectedRoute=f+" to "+t;
}

// PACKAGE
function setPackage(p){
selectedPackage=p;
alert("Selected "+p);
}

// PRICE
function calc(){
let km=300;
let trip=document.getElementById("trip").value;
let rate=document.getElementById("car").value;

km*=trip;
let total=(km*rate)+300;

document.getElementById("price").innerHTML=
`₹${total} (Approx)<br>⚠ Toll Extra`;
}

// BOOK
function book(){
let name=document.getElementById("name").value;
let date=document.getElementById("date").value;
let trip=document.getElementById("trip").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let car=document.getElementById("car").selectedOptions[0].text;

let msg=
`Booking:
Name:${name}
Date:${date}
Route:${from} to ${to}
Trip:${trip}
Car:${car}
Package:${selectedPackage}`;

window.open("https://wa.me/917413931002?text="+encodeURIComponent(msg));
}

// SEARCH
function searchCity(){
let val=document.getElementById("search").value.toLowerCase();

let data={
jaipur:["Amer Fort","Hawa Mahal"],
udaipur:["Lake Pichola"],
manali:["Snow"],
kashmir:["Gulmarg"],
amritsar:["Golden Temple"]
};

if(data[val]){
let html="<h3>"+val.toUpperCase()+"</h3>";
data[val].forEach(p=>{
html+="<div class='place'>"+p+"</div>";
});
document.getElementById("sheet").innerHTML=html;
document.getElementById("sheet").classList.add("show");
}
}

// CALL
function call(){
window.location.href="tel:7413931002";
}

// WA
function wa(){
window.open("https://wa.me/917413931002");
}

</script>

</body>
</html>
